<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ngự Kiếm</title>
<style>
  html, body { margin:0; padding:0; background:#000; height:100%; overflow:hidden; }
  #stage { position:relative; width:100vw; height:100vh; }
  video { display:none; }
  canvas { position:absolute; inset:0; width:100%; height:100%; }
  #hint {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    color:#eef; font:13px -apple-system, sans-serif; text-align:center;
    background:rgba(8,10,18,.55); padding:6px 16px; border-radius:14px;
    border:1px solid rgba(140,180,255,.25); pointer-events:none; z-index:10;
    letter-spacing:.3px; max-width:92vw;
  }
</style>
</head>
<body>
<div id="stage">
  <video id="video" playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="hint">Đang bật camera…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
<script>
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const hint   = document.getElementById('hint');

let W = 0, H = 0, DPR = Math.min(devicePixelRatio, 1.5);
function resize() {
  W = canvas.width  = innerWidth  * DPR;
  H = canvas.height = innerHeight * DPR;
}
addEventListener('resize', resize); resize();

// ================= Hand parsing =================
let hands = [], prevGesture = {}, palmPrev = {}; // palmPrev: {label:{x,y,t}}
const OPEN_T = 1.55, FIST_T = 1.05;

function parseHand(lm, label) {
  const wrist = lm[0], midMcp = lm[9];
  const base = Math.hypot(wrist.x - midMcp.x, wrist.y - midMcp.y) || 1e-6;
  const tips = [8, 12, 16, 20], pips = [6, 10, 14, 18];
  let s = 0; const up = [];
  for (let i = 0; i < 4; i++) {
    const dT = Math.hypot(lm[tips[i]].x - wrist.x, lm[tips[i]].y - wrist.y);
    const dP = Math.hypot(lm[pips[i]].x - wrist.x, lm[pips[i]].y - wrist.y);
    up.push(dT > dP * 1.08);
    s += dT;
  }
  // ngón cái: chóp 4 tách xa khớp ngón trỏ 5
  const thumbUp = Math.hypot(lm[4].x - lm[5].x, lm[4].y - lm[5].y) > base * 0.62;
  const nFingers = up.filter(Boolean).length + (thumbUp ? 1 : 0);
  const openness = (s / 4) / base;
  let gesture = 'other';
  if (openness < FIST_T) gesture = 'fist';
  else if (openness > OPEN_T && up.every(Boolean)) gesture = 'open';
  const P = p => ({ x: (1 - p.x) * W, y: p.y * H });
  return { ...P(midMcp), size: base * H, openness, gesture, nFingers, label,
           wrist: P(wrist) };
}

// ================= Person (segmentation) =================
const personCv = document.createElement('canvas');
const pctx = personCv.getContext('2d');
const probeCv = document.createElement('canvas'); probeCv.width = 64; probeCv.height = 36;
const probeCtx = probeCv.getContext('2d', { willReadFrequently: true });
let segReady = false, segBusy = false, seg = null;
let body = { x: 0.5, y: 0.55, w: 0.35, h: 0.8, seen: false }; // normalized (đã mirror)

const mpSeg = new SelfieSegmentation({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}` });
mpSeg.setOptions({ modelSelection: 1 });
mpSeg.onResults(r => {
  personCv.width = r.image.width; personCv.height = r.image.height;
  pctx.clearRect(0, 0, personCv.width, personCv.height);
  pctx.drawImage(r.segmentationMask, 0, 0);
  pctx.globalCompositeOperation = 'source-in';
  pctx.drawImage(r.image, 0, 0);
  pctx.globalCompositeOperation = 'source-over';
  // trọng tâm + khung người từ mask (downsample 64x36)
  probeCtx.drawImage(r.segmentationMask, 0, 0, 64, 36);
  const d = probeCtx.getImageData(0, 0, 64, 36).data;
  let sx = 0, sy = 0, n = 0, minX = 64, maxX = 0, minY = 36, maxY = 0;
  for (let y = 0; y < 36; y++) for (let x = 0; x < 64; x++) {
    if (d[(y * 64 + x) * 4] > 128) {
      sx += x; sy += y; n++;
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    }
  }
  if (n > 20) {
    const k = 0.25; // smooth
    body.x += ((1 - (sx / n + 0.5) / 64) - body.x) * k;   // mirror
    body.y += ((sy / n + 0.5) / 36 - body.y) * k;
    body.w += ((maxX - minX + 1) / 64 - body.w) * k;
    body.h += ((maxY - minY + 1) / 36 - body.h) * k;
    body.seen = true;
  } else body.seen = false;
  segReady = true; segBusy = false;
});

// ================= Kiếm =================
// swordMode: idle-orbit | gather | launch ; mỗi kiếm: {theta,sp,x,y,ang,z,trail,vx,vy,delay,gone}
let swords = [], swordMode = 'orbit';
let targetCount = 0, countBuf = [], spawnTimer = 0, cooldown = 0;
let gatherLabel = null, gatherLost = 0;
let parts = [], rings = [], flash = 0;

function emit(o) { parts.push({ vx:0, vy:0, life:1, decay:1.8, size:2.4, hue:200, ...o }); }

function orbitParams() {
  const cx = body.x * W, cy = (body.y - body.h * 0.12) * H;
  const rx = Math.max(body.w * W * 0.78, 170 * DPR);
  return { cx, cy, rx, ry: rx * 0.22 };
}

function newSword(theta) {
  return { theta, sp: 0, x: 0, y: 0, ang: 0, z: 0, trail: [], vx: 0, vy: 0, delay: 0, gone: false };
}

function update(dt) {
  flash = Math.max(0, flash - dt * 1.6);
  cooldown = Math.max(0, cooldown - dt);
  const { cx, cy, rx, ry } = orbitParams();

  // ---- đếm ngón (ổn định qua 10 mẫu) ----
  if (hands.length) {
    countBuf.push(Math.max(...hands.map(h => h.nFingers)));
    if (countBuf.length > 10) countBuf.shift();
  }
  const stable = (() => {
    if (countBuf.length < 6) return null;
    const freq = {};
    for (const c of countBuf) freq[c] = (freq[c] || 0) + 1;
    for (const k in freq) if (freq[k] >= 6) return +k;
    return null;
  })();

  if (swordMode === 'orbit') {
    // chỉnh số kiếm theo ngón tay (khi không cooldown, có tay, không nắm đấm)
    const fist = hands.find(h => h.gesture === 'fist');
    if (fist && swords.length > 0) {
      swordMode = 'gather'; gatherLabel = fist.label; gatherLost = 0;
      hint.textContent = '✊ Thu kiếm — bung tay ✋ để chưởng!';
    } else {
      if (stable !== null && cooldown <= 0 && hands.some(h => h.gesture !== 'fist')) targetCount = stable;
      spawnTimer -= dt;
      if (swords.length < targetCount && spawnTimer <= 0) {
        spawnTimer = 0.22;
        const th = swords.length ? swords[swords.length - 1].theta + 1.2 : -Math.PI / 2;
        swords.push(newSword(th));
        flash = Math.max(flash, 0.25);
        for (let i = 0; i < 14; i++) {
          const a = Math.random() * Math.PI * 2;
          emit({ x: cx + Math.cos(th) * rx, y: cy + Math.sin(th) * ry, vx: Math.cos(a)*2, vy: Math.sin(a)*2, hue: 195 });
        }
      }
      if (swords.length > targetCount) swords.splice(targetCount);
    }
    // quỹ đạo: dàn đều + tiến
    const n = swords.length;
    swords.forEach((s, i) => {
      s.sp = Math.min(1, s.sp + dt * 2.5);
      const want = i * Math.PI * 2 / Math.max(1, n);
      // kéo dần về vị trí dàn đều
      let diff = ((want - s.theta + swords[0].theta + Math.PI) % (Math.PI * 2)) - Math.PI;
      s.theta += dt * 1.5 + diff * dt * 1.2;
      s.z = Math.sin(s.theta);
      s.x = cx + Math.cos(s.theta) * rx;
      s.y = cy + s.z * ry + Math.sin(performance.now() / 500 + i * 2) * 6 * DPR;
      s.ang = s.theta + Math.PI / 2 + (s.z < 0 ? Math.PI : 0); // mũi theo chiều bay
    });
  }

  else if (swordMode === 'gather') {
    const h = hands.find(h => h.label === gatherLabel) || hands[0];
    if (!h) { gatherLost += dt; if (gatherLost > 0.6) swordMode = 'orbit'; }
    else {
      gatherLost = 0;
      // fist -> open = CHƯỞNG
      if (prevGesture[h.label] === 'fist' && h.gesture === 'open') {
        const pv = palmPrev[h.label];
        let dx = 0, dy = 0;
        if (pv) { dx = h.x - pv.x; dy = h.y - pv.y; }
        const sp = Math.hypot(dx, dy);
        let dirx, diry;
        if (sp > 12 * DPR) { dirx = dx / sp; diry = dy / sp; }                 // hướng tay đẩy
        else { const vx = h.x - cx, vy = h.y - cy, l = Math.hypot(vx, vy) || 1; dirx = vx / l; diry = vy / l; }
        swords.forEach((s, i) => {
          const spread = (i - (swords.length - 1) / 2) * 0.13;
          const ca = Math.cos(spread), sa = Math.sin(spread);
          s.vx = (dirx * ca - diry * sa) * 2400 * DPR / 60;
          s.vy = (dirx * sa + diry * ca) * 2400 * DPR / 60;
          s.ang = Math.atan2(s.vy, s.vx);
          s.delay = i * 0.05; s.trail = []; s.gone = false;
        });
        swordMode = 'launch'; flash = 1;
        rings.push({ x: h.x, y: h.y, r: 10 * DPR, a: 1 });
        hint.textContent = '⚔️ NGỰ KIẾM CHƯỞNG!';
      } else {
        // xoáy về nắm đấm
        swords.forEach((s, i) => {
          const a = i * Math.PI * 2 / Math.max(1, swords.length) + performance.now() / 300;
          const tx = h.x + Math.cos(a) * h.size * 0.55;
          const ty = h.y + Math.sin(a) * h.size * 0.55;
          s.x += (tx - s.x) * Math.min(1, dt * 9);
          s.y += (ty - s.y) * Math.min(1, dt * 9);
          s.ang = a;             // mũi kiếm chĩa ra ngoài quanh nắm đấm
          s.z = 1; s.sp = 1;
          if (Math.random() < 0.3) emit({ x: s.x, y: s.y, hue: 205, size: 1.8, decay: 2.5 });
        });
      }
    }
  }

  else if (swordMode === 'launch') {
    let alive = 0;
    for (const s of swords) {
      if (s.gone) continue;
      if (s.delay > 0) { s.delay -= dt; alive++; continue; }
      s.trail.push({ x: s.x, y: s.y });
      if (s.trail.length > 12) s.trail.shift();
      s.x += s.vx * dt * 60; s.y += s.vy * dt * 60;
      if (s.x < -0.2 * W || s.x > 1.2 * W || s.y < -0.2 * H || s.y > 1.2 * H) s.gone = true;
      else alive++;
      if (Math.random() < 0.5) emit({ x: s.x, y: s.y, hue: 200 + Math.random()*30, size: 2.2, decay: 2.2 });
    }
    if (alive === 0) {
      swords = []; targetCount = 0; countBuf = [];
      swordMode = 'orbit'; cooldown = 1.4;
      hint.textContent = 'Giơ ☝️…🖐️ 1-5 ngón để triệu kiếm';
    }
  }

  for (const r of rings) { r.r += 1400 * dt * DPR; r.a -= dt * 2.2; }
  rings = rings.filter(r => r.a > 0);

  // nhớ gesture + vị trí tay cho frame sau
  prevGesture = {};
  for (const h of hands) {
    prevGesture[h.label] = h.gesture;
    palmPrev[h.label] = { x: h.x, y: h.y, t: performance.now() };
  }
}

// ================= Vẽ =================
function drawSword(s) {
  const sc = (s.z >= 0 ? 1 + s.z * 0.22 : 1 + s.z * 0.35) * s.sp;
  const L = 96 * DPR * sc;
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.ang);
  ctx.globalAlpha = s.z < 0 ? 0.62 : 1;
  ctx.shadowColor = '#7fd0ff'; ctx.shadowBlur = 16 * DPR;
  // lưỡi kiếm
  const g = ctx.createLinearGradient(0, -L * 0.5, 0, L * 0.5);
  g.addColorStop(0, '#ffffff'); g.addColorStop(0.5, '#cfeaff'); g.addColorStop(1, '#7fb8e8');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(0, -L * 0.52);                       // mũi
  ctx.lineTo(L * 0.045, -L * 0.38);
  ctx.lineTo(L * 0.045, L * 0.30);
  ctx.lineTo(-L * 0.045, L * 0.30);
  ctx.lineTo(-L * 0.045, -L * 0.38);
  ctx.closePath(); ctx.fill();
  // sống kiếm sáng
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.fillRect(-L * 0.008, -L * 0.5, L * 0.016, L * 0.78);
  // chắn tay + chuôi
  ctx.shadowBlur = 8 * DPR;
  ctx.fillStyle = '#e8b84a';
  ctx.fillRect(-L * 0.11, L * 0.30, L * 0.22, L * 0.05);
  ctx.fillStyle = '#3a4a6a';
  ctx.fillRect(-L * 0.03, L * 0.35, L * 0.06, L * 0.16);
  ctx.fillStyle = '#e8b84a';
  ctx.beginPath(); ctx.arc(0, L * 0.53, L * 0.035, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function drawTrail(s) {
  if (!s.trail.length) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.strokeStyle = 'rgba(140,210,255,.55)'; ctx.lineCap = 'round';
  ctx.shadowColor = '#66bbff'; ctx.shadowBlur = 14 * DPR;
  for (let i = 1; i < s.trail.length; i++) {
    ctx.globalAlpha = i / s.trail.length * 0.6;
    ctx.lineWidth = (i / s.trail.length) * 7 * DPR;
    ctx.beginPath();
    ctx.moveTo(s.trail[i - 1].x, s.trail[i - 1].y);
    ctx.lineTo(s.trail[i].x, s.trail[i].y);
    ctx.stroke();
  }
  ctx.restore();
}

function coverMap() {
  const vw = video.videoWidth || 640, vh = video.videoHeight || 480;
  const sc = Math.max(W / vw, H / vh);
  return { dw: vw * sc, dh: vh * sc, ox: (W - vw * sc) / 2, oy: (H - vh * sc) / 2 };
}

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, W, H);

  const m = coverMap();
  // 1. nền camera (mirror)
  if (video.readyState >= 2) {
    ctx.save(); ctx.translate(W, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, m.ox, m.oy, m.dw, m.dh);
    ctx.restore();
  }

  update(dt);

  // 2. kiếm sau lưng (z<0) — bị người che
  const back = swords.filter(s => !s.gone && s.z < 0).sort((a, b) => a.z - b.z);
  for (const s of back) drawSword(s);

  // 3. người đè lên (cutout segmentation, cùng phép chiếu camera)
  if (segReady && personCv.width) {
    ctx.save(); ctx.translate(W, 0); ctx.scale(-1, 1);
    ctx.drawImage(personCv, m.ox, m.oy, m.dw, m.dh);
    ctx.restore();
  }

  // 4. kiếm trước mặt + vệt khí
  const front = swords.filter(s => !s.gone && s.z >= 0).sort((a, b) => a.z - b.z);
  for (const s of front) { drawTrail(s); drawSword(s); }

  // 5. hạt sáng + vòng chấn động + flash
  ctx.globalCompositeOperation = 'lighter';
  for (const p of parts) {
    p.life -= dt * p.decay;
    p.x += p.vx * dt * 60; p.y += p.vy * dt * 60;
    if (p.life <= 0) continue;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = `hsl(${p.hue} 100% 70%)`;
    ctx.shadowColor = `hsl(${p.hue} 100% 60%)`; ctx.shadowBlur = 8 * DPR;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * DPR * p.life, 0, Math.PI * 2); ctx.fill();
  }
  parts = parts.filter(p => p.life > 0);
  for (const r of rings) {
    ctx.globalAlpha = r.a;
    ctx.strokeStyle = '#bfe6ff'; ctx.shadowColor = '#66bbff'; ctx.shadowBlur = 20 * DPR;
    ctx.lineWidth = 5 * DPR * r.a;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  ctx.globalCompositeOperation = 'source-over';
  if (flash > 0) { ctx.fillStyle = `rgba(200,230,255,${Math.min(1, flash)})`; ctx.fillRect(0, 0, W, H); }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ================= MediaPipe =================
const mpHands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
mpHands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
mpHands.onResults(res => {
  hands = (res.multiHandLandmarks || []).map((lm, i) =>
    parseHand(lm, res.multiHandedness?.[i]?.label || String(i)));
});

let frameNo = 0;
const camera = new Camera(video, {
  onFrame: async () => {
    frameNo++;
    if (frameNo % 2 === 0) {
      if (!segBusy) { segBusy = true; await mpSeg.send({ image: video }); }
    } else {
      await mpHands.send({ image: video });
    }
  },
  width: 640, height: 480
});
camera.start().then(() => { hint.textContent = 'Giơ ☝️…🖐️ 1-5 ngón để triệu kiếm'; })
  .catch(err => { hint.textContent = 'Không bật được camera: ' + err.message; });
</script>
</body>
</html>
